version: '3.9'

services:

  app:
    build: .
    container_name: news_app
    restart: always
    ports:
      - "3000:3000"

    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: newsdb
      DB_PORT: 5432

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: news_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: